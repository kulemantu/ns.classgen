<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassGen Results</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a;line-height:1.5;padding:1rem;max-width:700px;margin:0 auto}
h1{font-size:1.25rem;color:#4f46e5;margin-bottom:.25rem}
.subtitle{font-size:.85rem;color:#666;margin-bottom:1.5rem}
.card{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card h2{font-size:1rem;color:#333;margin-bottom:.75rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;text-align:center;margin-bottom:1rem}
.stat-box{background:#f8f7ff;border-radius:10px;padding:.75rem .5rem}
.stat-box .num{font-size:1.75rem;font-weight:700;color:#4f46e5}
.stat-box .label{font-size:.75rem;color:#666;margin-top:.15rem}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.5rem .4rem;border-bottom:2px solid #e5e7eb;color:#666;font-weight:600;font-size:.75rem;text-transform:uppercase}
td{padding:.5rem .4rem;border-bottom:1px solid #f0f0f0}
.bar-bg{background:#e5e7eb;border-radius:6px;height:8px;overflow:hidden;margin-top:.25rem}
.bar-fill{height:100%;background:#4f46e5;border-radius:6px;transition:width .3s}
.q-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid #f0f0f0;font-size:.85rem}
.q-row:last-child{border-bottom:none}
.q-text{flex:1;margin-right:1rem}
.q-pct{font-weight:700;color:#4f46e5;white-space:nowrap}
.empty{text-align:center;padding:2rem;color:#999;font-size:.9rem}
#loading{text-align:center;padding:3rem;color:#666}
#error-msg{color:#dc2626;text-align:center;padding:2rem;display:none}
</style>
</head>
<body>
<h1>Quiz Results</h1>
<div class="subtitle" id="code-display"></div>
<div id="loading">Loading results...</div>
<div id="content" style="display:none">
  <div class="stats">
    <div class="stat-box"><div class="num" id="stat-submissions">0</div><div class="label">Students</div></div>
    <div class="stat-box"><div class="num" id="stat-avg">0</div><div class="label">Avg Score</div></div>
    <div class="stat-box"><div class="num" id="stat-total">0</div><div class="label">Questions</div></div>
  </div>

  <div class="card">
    <h2>Question Breakdown</h2>
    <div id="question-stats"></div>
  </div>

  <div class="card">
    <h2>Student Submissions</h2>
    <div id="submissions-table"></div>
  </div>
</div>
<div id="error-msg"></div>

<script>
const code = window.location.pathname.replace(/\/results\/?$/, '').split('/').pop();
document.getElementById('code-display').textContent = 'Code: ' + code;

async function load() {
  try {
    const res = await fetch('/api/h/' + code + '/results');
    if (!res.ok) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-msg').textContent = res.status === 404
        ? 'Homework code not found.'
        : 'Error loading results.';
      return;
    }
    const data = await res.json();

    document.getElementById('stat-submissions').textContent = data.total_submissions;
    document.getElementById('stat-avg').textContent = data.average_score + '/' + data.total_questions;
    document.getElementById('stat-total').textContent = data.total_questions;

    // Question breakdown
    const qDiv = document.getElementById('question-stats');
    if (data.question_stats.length === 0) {
      qDiv.innerHTML = '<div class="empty">No questions to show.</div>';
    } else {
      data.question_stats.forEach(function(q, i) {
        const row = document.createElement('div');
        row.className = 'q-row';
        row.innerHTML =
          '<div class="q-text">' + (i + 1) + '. ' + escapeHtml(q.question) + '</div>' +
          '<div class="q-pct">' + q.percent_correct + '%</div>';
        qDiv.appendChild(row);
        const barBg = document.createElement('div');
        barBg.className = 'bar-bg';
        barBg.innerHTML = '<div class="bar-fill" style="width:' + q.percent_correct + '%"></div>';
        qDiv.appendChild(barBg);
      });
    }

    // Submissions table
    const tDiv = document.getElementById('submissions-table');
    if (data.submissions.length === 0) {
      tDiv.innerHTML = '<div class="empty">No submissions yet. Share the homework code with students!</div>';
    } else {
      let html = '<table><thead><tr><th>Name</th><th>Class</th><th>Score</th></tr></thead><tbody>';
      data.submissions.forEach(function(s) {
        html += '<tr><td>' + escapeHtml(s.student_name) + '</td>'
          + '<td>' + escapeHtml(s.student_class) + '</td>'
          + '<td>' + s.score + '/' + s.total + '</td></tr>';
      });
      html += '</tbody></table>';
      tDiv.innerHTML = html;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Could not load results. Please try again.';
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

load();
</script>
</body>
</html>
