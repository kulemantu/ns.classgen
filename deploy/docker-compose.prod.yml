# Production stack for ClassGen
# Usage: cd deploy && docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.prod.example to .env.prod and fill in all values
#   2. Set DOMAIN in .env.prod to your domain (e.g. classgen.ng)
#   3. Point your domain's DNS A record to this server's IP
#
# Architecture:
#   Caddy (443/80) -> app (8000) -> Supabase Cloud (Postgres)
#                                -> Redis (6379, internal only)

services:
  # --- Caddy Reverse Proxy (auto-HTTPS) ---
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    environment:
      - DOMAIN=${DOMAIN:-localhost}

  # --- ClassGen App ---
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    env_file: .env.prod
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_ROOT=/app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - pdf_output:/app/static
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Redis ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  caddy_data:
  caddy_config:
  redisdata:
  pdf_output:
