# Production stack for nginx-proxy + letsencrypt-companion hosts
# Usage: docker compose -f deploy/docker-compose.nginx-proxy.yml up -d --build
#
# Requires:
#   1. Copy .env.prod.example to deploy/.env.prod and fill in values
#   2. Set VIRTUAL_HOST / LETSENCRYPT_HOST to your domain
#   3. DNS A record pointing to the server
#   4. External 'proxy' network (nginx-proxy)

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: classgen-app
    restart: unless-stopped
    expose:
      - "8000"
    env_file: .env.prod
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST:-class.dater.world}
      - VIRTUAL_PORT=8000
      - LETSENCRYPT_HOST=${LETSENCRYPT_HOST:-class.dater.world}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@dater.world}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - pdf_output:/app/static
    networks:
      - proxy
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: classgen-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  redisdata:
  pdf_output:

networks:
  proxy:
    external: true
