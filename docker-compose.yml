version: "3.8"

# Local development stack for ClassGen
# Usage: docker compose up -d
# The app connects to Postgres via Supabase client (PostgREST).
# Redis is available for future session/cache use.

services:
  # --- ClassGen App ---
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - SUPABASE_URL=http://rest:3000
      - SUPABASE_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.ZopqoUt20nEV9cklpv9e3yCwind2FvMNT8CDGaHU-BI}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - pdf_output:/app/static

  # --- Postgres (Supabase-compatible) ---
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: classgen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- PostgREST (provides the REST API that the Supabase client talks to) ---
  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@db:5432/classgen
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters
      PGRST_SERVER_PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # --- Redis (session cache, rate limiting, future use) ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru

volumes:
  pgdata:
  redisdata:
  pdf_output:
