<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ClassGen{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a;line-height:1.5;padding:1rem;max-width:700px;margin:0 auto}
h1{font-size:1.25rem;color:#4f46e5;margin-bottom:.25rem}
.subtitle{font-size:.85rem;color:#666;margin-bottom:1.5rem}
.card{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card h2{font-size:1rem;color:#333;margin-bottom:.75rem}
.card p{font-size:.9rem;color:#555;white-space:pre-line}
.empty{text-align:center;padding:2rem;color:#999;font-size:.9rem}
#loading{text-align:center;padding:3rem;color:#666}
.error{color:#dc2626;text-align:center;padding:2rem}
.badge{display:inline-block;background:#ede9fe;color:#4f46e5;font-size:.75rem;font-weight:600;padding:.2rem .6rem;border-radius:999px}
a{color:#4f46e5;text-decoration:none}
a:hover{text-decoration:underline}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:.75rem;text-align:center;margin-bottom:1rem}
.stat-box{background:#f8f7ff;border-radius:10px;padding:.75rem .5rem}
.stat-box .num{font-size:1.75rem;font-weight:700;color:#4f46e5}
.stat-box .label{font-size:.75rem;color:#666;margin-top:.15rem}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.5rem .4rem;border-bottom:2px solid #e5e7eb;color:#666;font-weight:600;font-size:.75rem;text-transform:uppercase}
td{padding:.5rem .4rem;border-bottom:1px solid #f0f0f0}
label{display:block;font-size:.85rem;font-weight:600;color:#333;margin-bottom:.25rem;margin-top:.75rem}
input[type=text]{width:100%;padding:.6rem;border:1px solid #ddd;border-radius:8px;font-size:.9rem}
input[type=text]:focus{outline:none;border-color:#4f46e5}
button[type=submit]{width:100%;padding:.75rem;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1rem}
button[type=submit]:hover{background:#4338ca}
button[type=submit]:disabled{background:#999;cursor:not-allowed}
.footer{text-align:center;margin-top:2rem;font-size:.75rem;color:#999}
{% block extra_css %}{% endblock %}
</style>
</head>
<body>
{% block body %}{% endblock %}
<div class="footer">ClassGen &middot; AI lesson packs for African classrooms</div>
{% block extra_js %}{% endblock %}
</body>
</html>
