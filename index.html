<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassGen | Lesson Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            background-image: url('/static/images/app_background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #f8fafc;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        #chat-feed {
            position: absolute;
            top: 60px; left: 0; right: 0; bottom: 80px;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }

        .message-bubble {
            max-width: 85%;
            width: fit-content;
            padding: 1.25rem 1.5rem;
            border-radius: 24px;
            font-size: 1.05rem;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(20px);
            animation: popIn 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        @keyframes popIn {
            0%   { opacity: 0; transform: translateY(20px) scale(0.95); }
            50%  { transform: translateY(-3px) scale(1.01); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        #breadcrumb-header {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 60px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            z-index: 20;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }
        #breadcrumb-header.visible { transform: translateY(0); }
        .breadcrumb-item { display: flex; align-items: center; }
        .breadcrumb-separator { margin: 0 0.5rem; color: #475569; }

        #input-area {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 1rem 1.5rem;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.95) 50%, transparent);
            display: flex;
            gap: 1rem;
            align-items: center;
            z-index: 20;
            justify-content: center;
        }

        .chat-input-wrapper {
            width: 100%;
            max-width: 800px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #dynamic-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        #mainInput {
            width: 100%;
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: #e2e8f0;
            padding: 1rem 4rem 1rem 1.5rem;
            border-radius: 9999px;
            outline: none;
            font-size: 1.05rem;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
        }
        #mainInput:focus {
            border-color: #818cf8;
            box-shadow: 0 4px 25px rgba(99, 102, 241, 0.3);
        }

        #input-area button.send-btn {
            position: absolute;
            right: 8px; bottom: 6px;
            background: #4f46e5;
            color: white;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        #input-area button.send-btn:hover {
            background: #4338ca;
            transform: scale(1.05);
        }

        .suggestion-pill {
            background: rgba(79, 70, 229, 0.2);
            border: 1px solid rgba(79, 70, 229, 0.5);
            color: #c7d2fe;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
            backdrop-filter: blur(4px);
        }
        .suggestion-pill:hover {
            background: rgba(79, 70, 229, 0.4);
            transform: translateY(-2px);
            color: white;
        }

        .bubble-ai {
            align-self: flex-start;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
            color: #e2e8f0;
        }
        .bubble-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            border-bottom-right-radius: 4px;
            color: #ffffff;
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-weight: 600;
            border-bottom: none;
            color: #fff;
            margin-top: 1em;
            margin-bottom: 0.5rem;
        }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1rem; }
        .markdown-body p { margin-bottom: 0.75em; line-height: 1.6; }
        .markdown-body strong { color: #f8fafc; font-weight: 700; }

        .typing-indicator { display: flex; gap: 4px; padding: 0.5rem 0; }
        .typing-indicator span {
            width: 8px; height: 8px;
            background-color: #818cf8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Encyclopedia Blocks */
        .encyclopedia-block {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .encyclopedia-block:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            border-color: #818cf8;
        }
        .encyclopedia-block .encyclopedia-title {
            display: flex; align-items: center; gap: 0.75rem;
            font-weight: 600; color: #a5b4fc; font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .encyclopedia-block .encyclopedia-summary {
            font-size: 0.95rem; color: #cbd5e1; line-height: 1.4;
        }

        /* Encyclopedia Modal */
        #encyclopedia-modal {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
        }
        #encyclopedia-modal.active { opacity: 1; visibility: visible; }
        #encyclopedia-modal .modal-content {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            max-width: 700px; width: 90%; max-height: 80%;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #encyclopedia-modal.active .modal-content { transform: scale(1); }
        #encyclopedia-modal .close-modal {
            position: absolute; top: 1rem; right: 1rem;
            background: none; border: none;
            font-size: 1.5rem; color: #94a3b8; cursor: pointer;
            transition: color 0.2s;
        }
        #encyclopedia-modal .close-modal:hover { color: #e2e8f0; }

        /* PDF download link */
        .pdf-download {
            display: inline-flex; align-items: center; gap: 0.5rem;
            margin-top: 0.75rem;
            padding: 0.5rem 1rem;
            background: rgba(79, 70, 229, 0.2);
            border: 1px solid rgba(79, 70, 229, 0.4);
            border-radius: 12px;
            color: #a5b4fc;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .pdf-download:hover {
            background: rgba(79, 70, 229, 0.4);
            color: white;
        }
    </style>
</head>

<body class="text-slate-200 antialiased overflow-hidden">

    <div id="canvas-container"></div>

    <div id="breadcrumb-header"></div>

    <div id="chat-feed">
        <div class="message-bubble bubble-ai">
            <div class="font-semibold text-indigo-400 mb-1 text-sm tracking-wide uppercase">ClassGen AI</div>
            Hey! Let's build a great lesson. What subject are we teaching today?
        </div>
    </div>

    <div id="encyclopedia-modal" onclick="closeEncyclopedia(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeEncyclopedia()">&#x2715;</button>
            <div id="encyclopedia-body" class="markdown-body"></div>
        </div>
    </div>

    <div id="input-area">
        <div class="chat-input-wrapper">
            <div id="dynamic-controls"></div>
            <div class="relative flex items-center w-full mt-1">
                <input type="text" id="mainInput" placeholder="ex. Wow my class with facts about the solar system..."
                    onkeypress="handleEnter(event)" autocomplete="off">
                <button onclick="submitPrompt()" class="send-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const threadId = "chat_demo_" + Math.random().toString(36).substring(7);
        const chatFeed = document.getElementById('chat-feed');
        const inputField = document.getElementById('mainInput');
        const contextPath = [];

        function triggerHaptic(type = 'light') {
            if (navigator.vibrate) {
                navigator.vibrate(type === 'medium' ? 20 : 10);
            }
        }

        // --- Three.js Background ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog('#0f172a', 10, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xa5b4fc, 3);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);
        const pointLight1 = new THREE.PointLight(0x06b6d4, 4, 60);
        pointLight1.position.set(-15, 10, 15);
        scene.add(pointLight1);
        const pointLight2 = new THREE.PointLight(0xec4899, 4, 60);
        pointLight2.position.set(15, -10, 15);
        scene.add(pointLight2);

        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x818cf8, metalness: 0.3, roughness: 0.1,
            transmission: 0.9, ior: 1.8, dispersion: 1.0, thickness: 1.0,
            transparent: true, opacity: 1, side: THREE.DoubleSide,
            clearcoat: 1.0, clearcoatRoughness: 0.1, blending: THREE.AdditiveBlending
        });

        const geometries = [
            new THREE.IcosahedronGeometry(2, 0),
            new THREE.BoxGeometry(2.5, 2.5, 2.5),
            new THREE.ConeGeometry(2, 3, 4)
        ];

        const shapes = [];
        const count = 30;
        const orbitGroups = [new THREE.Group(), new THREE.Group(), new THREE.Group()];
        orbitGroups.forEach(g => scene.add(g));

        const shapeColors = [0x0284c7, 0x7e22ce, 0xbe185d];
        const edgeColors = [0x38bdf8, 0xc084fc, 0xf472b6];

        geometries.forEach((geom, i) => {
            const material = glassMaterial.clone();
            material.color.setHex(shapeColors[i]);
            const edgeMaterial = new THREE.LineBasicMaterial({
                color: edgeColors[i], transparent: true, opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            for (let j = 0; j < count; j++) {
                const group = new THREE.Group();
                group.add(new THREE.Mesh(geom, material));
                group.add(new THREE.LineSegments(new THREE.EdgesGeometry(geom), edgeMaterial));
                group.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*60, (Math.random()-0.5)*40);
                group.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                group.userData = {
                    rx: (Math.random()-0.5)*0.015, ry: (Math.random()-0.5)*0.015, rz: (Math.random()-0.5)*0.015,
                    baseColor: material.color.clone()
                };
                shapes.push(group);
                orbitGroups[i].add(group);
            }
        });

        camera.position.z = 25;
        let speedMultiplier = 1;
        let targetColorAmount = 0;
        const thinkingColor = new THREE.Color(0x06b6d4);
        const orbitSpeed = 0.0005;

        function animate() {
            requestAnimationFrame(animate);
            orbitGroups.forEach((g, i) => {
                g.rotation.y += orbitSpeed * speedMultiplier * (i+1) * 0.5;
                g.rotation.x += orbitSpeed * speedMultiplier * 0.5;
            });
            shapes.forEach(group => {
                group.rotation.x += group.userData.rx * speedMultiplier;
                group.rotation.y += group.userData.ry * speedMultiplier;
                group.rotation.z += group.userData.rz * speedMultiplier;
                const target = targetColorAmount > 0 ? thinkingColor : group.userData.baseColor;
                group.children[0].material.color.lerp(target, 0.05);
                group.children[1].material.color.lerp(target, 0.05);
            });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function setThinkingState() { speedMultiplier = 5; targetColorAmount = 1; }
        function setIdleState() { speedMultiplier = 1; targetColorAmount = 0; }

        // --- UI Helpers ---
        function scrollToBottom() {
            setTimeout(() => chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' }), 50);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function openEncyclopedia(title, detailsHtml) {
            triggerHaptic('light');
            const modal = document.getElementById('encyclopedia-modal');
            const body = document.getElementById('encyclopedia-body');
            body.innerHTML = `
                <div class="text-indigo-400 mb-4 text-xs font-bold tracking-widest">${escapeHtml(title)}</div>
                <div class="text-slate-200 leading-relaxed text-lg">${detailsHtml}</div>
            `;
            modal.classList.add('active');
        }

        function closeEncyclopedia(e) {
            if (e && e.target !== document.getElementById('encyclopedia-modal') && !e.target.classList.contains('close-modal')) return;
            triggerHaptic('light');
            document.getElementById('encyclopedia-modal').classList.remove('active');
        }

        function handleEnter(e) { if (e.key === 'Enter') submitPrompt(); }

        function submitPromptWithText(text) {
            inputField.value = text;
            submitPrompt();
        }

        // --- Block type icons ---
        const BLOCK_ICONS = {
            // Lesson flow blocks
            OPENER: '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>',
            EXPLAIN: '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>',
            ACTIVITY: '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>',
            HOMEWORK: '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>',
            TEACHER_NOTES: '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>',
            // Legacy block types (backwards compat with older sessions)
            HOOK: '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>',
            FACT: '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>',
            APPLICATION: '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>'
        };

        function renderBlock(blockType, title, summary, details) {
            const icon = BLOCK_ICONS[blockType] || BLOCK_ICONS.HOOK;
            const block = document.createElement('div');
            block.className = 'encyclopedia-block';
            block.innerHTML = `
                <div class="encyclopedia-title">${icon} ${escapeHtml(title)}</div>
                <div class="encyclopedia-summary">${escapeHtml(summary)}</div>
            `;
            // Render details with newlines preserved in modal
            block.addEventListener('click', () => {
                const formattedDetails = escapeHtml(details).replace(/\n/g, '<br>');
                openEncyclopedia(title, formattedDetails);
            });
            return block;
        }

        // --- Main Submit ---
        async function submitPrompt() {
            let text = inputField.value.trim();
            if (!text) return;

            inputField.value = '';
            inputField.disabled = true;
            triggerHaptic('medium');

            // Update breadcrumbs
            contextPath.push(text);
            const header = document.getElementById('breadcrumb-header');
            header.classList.add('visible');
            const displayPath = contextPath.slice(-4);
            header.innerHTML = '<div class="font-semibold text-slate-300 mr-3">CONTEXT:</div>' +
                displayPath.map((item, i) => {
                    const escaped = escapeHtml(item);
                    const sep = i < displayPath.length - 1 ? '<div class="breadcrumb-separator">&#x203A;</div>' : '';
                    return `<div class="breadcrumb-item inline-block overflow-hidden text-ellipsis max-w-[150px]">${escaped}</div>${sep}`;
                }).join('');

            // User bubble
            const userBubble = document.createElement('div');
            userBubble.className = 'message-bubble bubble-user';
            userBubble.textContent = text;
            chatFeed.appendChild(userBubble);
            scrollToBottom();

            // Thinking bubble
            const typingBubble = document.createElement('div');
            typingBubble.className = 'message-bubble bubble-ai';
            typingBubble.innerHTML = `
                <div class="font-semibold text-cyan-400 mb-1 text-sm tracking-wide uppercase">ClassGen Processing</div>
                <div class="typing-indicator"><span></span><span></span><span></span></div>
            `;
            chatFeed.appendChild(typingBubble);
            scrollToBottom();
            setThinkingState();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: threadId })
                });
                const data = await response.json();
                chatFeed.removeChild(typingBubble);

                let rawText = data.reply;
                let pillFragment = null;

                // Extract suggestion pills (clarifying question flow)
                const suggestsMatch = rawText.match(/SUGGESTIONS:\s*(.*)/i);
                if (suggestsMatch) {
                    const options = suggestsMatch[1].split('|').map(o => o.trim().replace(/^\[|\]$/g, '').trim()).filter(Boolean);
                    rawText = rawText.replace(/SUGGESTIONS:\s*(.*)/i, '').trim();

                    pillFragment = document.createDocumentFragment();
                    options.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = 'suggestion-pill';
                        btn.textContent = opt;
                        btn.addEventListener('click', () => submitPromptWithText(opt));
                        pillFragment.appendChild(btn);
                    });
                }

                // Parse lesson blocks
                const blockRegex = /\[BLOCK_START_(.*?)\](.*?)\[BLOCK_END\]/gs;
                const blocks = [];
                let match;
                while ((match = blockRegex.exec(rawText)) !== null) {
                    const blockType = match[1].trim();
                    const blockContent = match[2];
                    const titleMatch = blockContent.match(/Title:\s*\*{0,2}(.*?)\*{0,2}\s*(?:\n|$)/i);
                    const summaryMatch = blockContent.match(/Summary:\s*(.*?)(?:\n|$)/i);
                    const detailsMatch = blockContent.match(/Details:\s*([\s\S]*?)$/i);

                    blocks.push({
                        type: blockType,
                        title: titleMatch ? titleMatch[1].replace(/\*\*/g, '').trim() : blockType,
                        summary: summaryMatch ? summaryMatch[1].trim() : '',
                        details: detailsMatch ? detailsMatch[1].trim() : ''
                    });
                }

                const hasBlocks = blocks.length > 0;

                if (hasBlocks) {
                    // Lesson pack — render as block cards in a transparent wrapper
                    const wrapper = document.createElement('div');
                    wrapper.className = 'message-bubble !bg-transparent !border-0 !shadow-none !p-0 max-w-2xl';

                    const label = document.createElement('div');
                    label.className = 'font-semibold text-indigo-400 mb-2 pl-2 text-sm tracking-wide uppercase';
                    label.textContent = 'Lesson Pack';
                    wrapper.appendChild(label);

                    blocks.forEach(b => wrapper.appendChild(renderBlock(b.type, b.title, b.summary, b.details)));

                    // PDF download link
                    if (data.pdf_url) {
                        const pdfLink = document.createElement('a');
                        pdfLink.href = data.pdf_url;
                        pdfLink.target = '_blank';
                        pdfLink.className = 'pdf-download';
                        pdfLink.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg> Download Lesson PDF';
                        wrapper.appendChild(pdfLink);
                    }

                    chatFeed.appendChild(wrapper);
                } else {
                    // Clarifying question — render as a normal AI chat bubble (no double wrapper)
                    const aiBubble = document.createElement('div');
                    aiBubble.className = 'message-bubble bubble-ai';

                    let formattedHtml = escapeHtml(rawText).replace(/\n/g, '<br>');
                    formattedHtml = formattedHtml.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    aiBubble.innerHTML = `
                        <div class="font-semibold text-indigo-400 mb-1 text-sm tracking-wide uppercase">ClassGen AI</div>
                        ${formattedHtml}
                    `;
                    chatFeed.appendChild(aiBubble);
                }

                // Update suggestion pills
                const dynamicControls = document.getElementById('dynamic-controls');
                dynamicControls.innerHTML = '';
                if (pillFragment) {
                    dynamicControls.appendChild(pillFragment);
                }

                scrollToBottom();
                setIdleState();

            } catch (err) {
                if (chatFeed.contains(typingBubble)) chatFeed.removeChild(typingBubble);
                setIdleState();

                const errBubble = document.createElement('div');
                errBubble.className = 'message-bubble bubble-ai !border-red-500/50';
                errBubble.innerHTML = `
                    <div class="text-red-400 font-medium">Connection Error</div>
                    <p class="text-sm mt-1 opacity-70">${escapeHtml(err.message)}</p>
                `;
                chatFeed.appendChild(errBubble);
                scrollToBottom();
            }

            inputField.disabled = false;
            inputField.focus();
        }

        window.onload = () => inputField.focus();
    </script>
</body>
</html>
