<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassGen | Lesson Chat</title>
    <!-- Emoji favicon using SVG with better cross-browser support -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
    <link rel="alternate icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
    <link rel="mask-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" color="#8ACFC5">
    <!-- Apply saved theme before paint to avoid flash -->
    <script>(function(){var t=localStorage.getItem('classgen_theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Theme tokens ─────────────────────────────────── */
        :root {
            /* Light mode (WhatsApp classic) */
            --header-bg:         #008069;
            --header-avatar-bg:  #25D366;
            --chat-bg:           #ECE5DD;
            --text-primary:      #111B21;
            --bubble-ai-bg:      #FFFFFF;
            --bubble-ai-text:    #111B21;
            --bubble-user-bg:    #DCF8C6;
            --bubble-user-text:  #111B21;
            --bubble-time:       #667781;
            --bubble-ticks:      #34B7F1;
            --bubble-shadow:     0 1px 2px rgba(0,0,0,0.12);
            --msg-buttons-bg:    #FFFFFF;
            --msg-btn-border:    #E9EDEF;
            --msg-btn-text:      #027EB5;
            --msg-btn-hover:     rgba(2,126,181,0.06);
            --input-area-bg:     #F0F2F5;
            --input-field-bg:    #FFFFFF;
            --input-field-text:  #3B4A54;
            --input-placeholder: #8696A0;
            --send-btn-bg:       #008069;
            --send-btn-hover:    #017560;
            --breadcrumb-bg:     rgba(0,128,105,0.06);
            --breadcrumb-border: rgba(0,128,105,0.15);
            --breadcrumb-text:   #667781;
            --enc-block-bg:      #FFFFFF;
            --enc-block-border:  #E9EDEF;
            --enc-block-hover:   #F5F6F6;
            --enc-block-title:   #111B21;
            --enc-block-summary: #667781;
            --enc-block-icon:    #008069;
            --enc-hover-border:  #008069;
            --accent:            #008069;
            --accent-alt:        #027EB5;
            --lesson-border:     #E0E0E0;
            --lesson-hover:      rgba(0,128,105,0.06);
            --modal-bg:          #FFFFFF;
            --modal-border:      #E9EDEF;
            --modal-text:        #111B21;
            --modal-close:       #667781;
            --modal-accent:      #008069;
            --scrollbar:         #C4CAD0;
            --sidebar-bg:        #F0F2F5;
            --sidebar-body-bg:   #F0F2F5;
            --sidebar-text:      #3B4A54;
            --sidebar-muted:     #667781;
            --sidebar-tab-bg:    #FFFFFF;
            --sidebar-tab-text:  #667781;
            --sidebar-tab-active:#008069;
            --sidebar-stat-bg:   #FFFFFF;
            --sidebar-stat-border:#E9EDEF;
            --sidebar-stat-num:  #008069;
            --sidebar-stat-lbl:  #667781;
            --sidebar-badge-bg:  rgba(0,128,105,0.1);
            --sidebar-badge-bd:  rgba(0,128,105,0.25);
            --sidebar-badge-text:#005C4B;
            --sidebar-input-bg:  #FFFFFF;
            --sidebar-input-bd:  #E9EDEF;
            --sidebar-input-focus:#008069;
            --sidebar-input-text:#111B21;
            --sidebar-btn-bg:    #008069;
            --sidebar-btn-hover: #017560;
            --sidebar-code-bd:   #E9EDEF;
            --sidebar-code-link: #027EB5;
            --sidebar-code-title:#667781;
            --sidebar-border:    #E9EDEF;
            --sidebar-divider:   #E9EDEF;
            --sidebar-close:     #667781;
            --toggle-off:        #C4C4C4;
            --toggle-on:         #008069;
            --overlay-bg:        rgba(0,0,0,0.35);
            --typing-dot:        #9DB3BF;
        }

        [data-theme="dark"] {
            --header-bg:         #202C33;
            --header-avatar-bg:  #00A884;
            --chat-bg:           #0B141A;
            --text-primary:      #E9EDEF;
            --bubble-ai-bg:      #202C33;
            --bubble-ai-text:    #E9EDEF;
            --bubble-user-bg:    #005C4B;
            --bubble-user-text:  #E9EDEF;
            --bubble-time:       #8696A0;
            --bubble-ticks:      #53BDEB;
            --bubble-shadow:     none;
            --msg-buttons-bg:    #202C33;
            --msg-btn-border:    #374045;
            --msg-btn-text:      #53BDEB;
            --msg-btn-hover:     rgba(83,189,235,0.08);
            --input-area-bg:     #202C33;
            --input-field-bg:    #2A3942;
            --input-field-text:  #E9EDEF;
            --input-placeholder: #8696A0;
            --send-btn-bg:       #00A884;
            --send-btn-hover:    #02C09A;
            --breadcrumb-bg:     rgba(0,150,136,0.1);
            --breadcrumb-border: rgba(0,168,132,0.15);
            --breadcrumb-text:   #8696A0;
            --enc-block-bg:      #202C33;
            --enc-block-border:  #374045;
            --enc-block-hover:   #263340;
            --enc-block-title:   #E9EDEF;
            --enc-block-summary: #8696A0;
            --enc-block-icon:    #00A884;
            --enc-hover-border:  #53BDEB;
            --accent:            #00A884;
            --accent-alt:        #53BDEB;
            --lesson-border:     #374045;
            --lesson-hover:      rgba(83,189,235,0.08);
            --modal-bg:          #1F2C34;
            --modal-border:      #374045;
            --modal-text:        #E9EDEF;
            --modal-close:       #8696A0;
            --modal-accent:      #00A884;
            --scrollbar:         #374045;
            --sidebar-bg:        #111B21;
            --sidebar-body-bg:   #111B21;
            --sidebar-text:      #E9EDEF;
            --sidebar-muted:     #8696A0;
            --sidebar-tab-bg:    #202C33;
            --sidebar-tab-text:  #8696A0;
            --sidebar-tab-active:#00A884;
            --sidebar-stat-bg:   #202C33;
            --sidebar-stat-border:#374045;
            --sidebar-stat-num:  #00A884;
            --sidebar-stat-lbl:  #8696A0;
            --sidebar-badge-bg:  rgba(0,168,132,0.12);
            --sidebar-badge-bd:  rgba(0,168,132,0.28);
            --sidebar-badge-text:#A7D8CC;
            --sidebar-input-bg:  #2A3942;
            --sidebar-input-bd:  #374045;
            --sidebar-input-focus:#00A884;
            --sidebar-input-text:#E9EDEF;
            --sidebar-btn-bg:    #00A884;
            --sidebar-btn-hover: #02C09A;
            --sidebar-code-bd:   #374045;
            --sidebar-code-link: #53BDEB;
            --sidebar-code-title:#8696A0;
            --sidebar-border:    #374045;
            --sidebar-divider:   #374045;
            --sidebar-close:     #8696A0;
            --toggle-off:        #374045;
            --toggle-on:         #00A884;
            --overlay-bg:        rgba(0,0,0,0.5);
            --typing-dot:        #8696A0;
        }

        /* Smooth theme transition */
        html.theme-transitioning *,
        html.theme-transitioning *::before,
        html.theme-transitioning *::after {
            transition:
                background-color 0.25s ease,
                color 0.25s ease,
                border-color 0.25s ease,
                box-shadow 0.25s ease !important;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--chat-bg);
            color: var(--text-primary);
        }

        /* ── Chat Container ─────────────────────────────── */
        #chat-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
        }

        /* ── Header ─────────────────────────────────────── */
        #chat-header {
            height: 60px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            padding: 0 12px 0 16px;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }

        .header-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--header-avatar-bg);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1rem;
            margin-right: 12px;
            flex-shrink: 0;
            user-select: none;
        }

        .header-info { flex: 1; overflow: hidden; }
        .header-name {
            color: #fff; font-weight: 600; font-size: 1rem;
            line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .header-status { color: rgba(255,255,255,0.72); font-size: 0.7rem; margin-top: 1px; }

        .header-actions { display: flex; align-items: center; gap: 4px; }

        .header-btn {
            background: none; border: none;
            color: rgba(255,255,255,0.78);
            cursor: pointer; padding: 7px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.18s, color 0.18s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
        .header-btn.registered { color: #fff; }

        #notify-btn {
            display: none;
            background: none; border: 1px solid rgba(255,255,255,0.4);
            color: rgba(255,255,255,0.82); border-radius: 6px;
            padding: 5px 10px; font-size: 0.73rem; cursor: pointer;
            transition: all 0.2s; font-family: inherit; white-space: nowrap;
        }
        #notify-btn:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.7); }

        /* ── Breadcrumb bar ─────────────────────────────── */
        #breadcrumb-bar {
            background: var(--breadcrumb-bg);
            border-bottom: 1px solid var(--breadcrumb-border);
            padding: 4px 16px;
            font-size: 0.71rem; color: var(--breadcrumb-text);
            white-space: nowrap; overflow-x: auto; scrollbar-width: none;
            display: none; flex-shrink: 0;
        }
        #breadcrumb-bar::-webkit-scrollbar { display: none; }
        #breadcrumb-bar.visible { display: block; }

        /* ── Chat Feed ──────────────────────────────────── */
        #chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 12px 5% 10px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            scroll-behavior: smooth;
        }
        #chat-feed::-webkit-scrollbar { width: 4px; }
        #chat-feed::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

        /* ── Message Groups ─────────────────────────────── */
        .msg-group { display: flex; flex-direction: column; margin-bottom: 4px; }
        .msg-group.ai   { align-items: flex-start; }
        .msg-group.user { align-items: flex-end; }

        /* ── Bubbles ────────────────────────────────────── */
        .message-bubble {
            max-width: min(65%, 480px);
            padding: 8px 10px 5px;
            border-radius: 7.5px;
            font-size: 0.9rem;
            line-height: 1.55;
            position: relative;
            word-break: break-word;
            box-shadow: var(--bubble-shadow);
            opacity: 0;
            transform: translateY(6px);
            animation: bubbleIn 0.2s ease forwards;
        }
        @keyframes bubbleIn { to { opacity: 1; transform: translateY(0); } }

        .bubble-ai {
            background: var(--bubble-ai-bg);
            color: var(--bubble-ai-text);
            border-top-left-radius: 0;
        }
        .bubble-ai::before {
            content: '';
            position: absolute; top: 0; left: -8px;
            width: 0; height: 0;
            border-right: 8px solid var(--bubble-ai-bg);
            border-bottom: 8px solid transparent;
        }

        .bubble-user {
            background: var(--bubble-user-bg);
            color: var(--bubble-user-text);
            border-top-right-radius: 0;
        }
        .bubble-user::before {
            content: '';
            position: absolute; top: 0; right: -8px;
            width: 0; height: 0;
            border-left: 8px solid var(--bubble-user-bg);
            border-bottom: 8px solid transparent;
        }

        .bubble-footer {
            display: flex; justify-content: flex-end; align-items: center;
            gap: 3px; margin-top: 4px;
        }
        .bubble-time  { font-size: 11px; color: var(--bubble-time); white-space: nowrap; }
        .bubble-ticks { font-size: 12px; color: var(--bubble-ticks); line-height: 1; }

        /* ── WA Button-attached messages ────────────────── */
        .msg-buttons {
            background: var(--msg-buttons-bg);
            border-radius: 0 0 7.5px 7.5px;
            overflow: hidden;
            max-width: min(65%, 480px);
            margin-top: 2px;
            box-shadow: var(--bubble-shadow);
        }

        .wa-reply-btn {
            display: block; width: 100%;
            padding: 10px 16px;
            background: transparent; border: none;
            border-top: 1px solid var(--msg-btn-border);
            color: var(--msg-btn-text);
            font-size: 0.875rem; font-weight: 500;
            cursor: pointer; text-align: center;
            transition: background 0.15s;
            font-family: inherit;
        }
        .wa-reply-btn:hover { background: var(--msg-btn-hover); }

        /* ── Typing Indicator ───────────────────────────── */
        .typing-indicator { display: flex; gap: 4px; padding: 3px 2px 2px; }
        .typing-indicator span {
            width: 7px; height: 7px;
            background: var(--typing-dot);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40%  { transform: scale(1); }
        }

        /* ── Lesson Pack ────────────────────────────────── */
        .lesson-pack-wrapper {
            align-self: flex-start;
            max-width: min(80%, 560px);
            width: 100%; margin-bottom: 6px;
            opacity: 0; animation: bubbleIn 0.25s ease forwards;
        }
        .lesson-pack-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--accent); margin-bottom: 6px; padding-left: 2px;
        }

        .encyclopedia-block {
            background: var(--enc-block-bg);
            border: 1px solid var(--enc-block-border);
            border-radius: 8px; padding: 10px 12px; margin-bottom: 4px;
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s;
            box-shadow: var(--bubble-shadow);
        }
        .encyclopedia-block:hover { background: var(--enc-block-hover); border-color: var(--enc-hover-border); }
        .encyclopedia-block .encyclopedia-title {
            display: flex; align-items: center; gap: 8px;
            font-weight: 600; color: var(--enc-block-title); font-size: 0.9rem; margin-bottom: 3px;
        }
        .encyclopedia-block .encyclopedia-title svg { color: var(--enc-block-icon); flex-shrink: 0; }
        .encyclopedia-block .encyclopedia-summary {
            font-size: 0.83rem; color: var(--enc-block-summary); line-height: 1.4; padding-left: 24px;
        }

        .lesson-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .lesson-action-btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 7px 12px;
            background: var(--enc-block-bg); border: 1px solid var(--lesson-border);
            border-radius: 7px; color: var(--accent-alt);
            font-size: 0.8rem; text-decoration: none; cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            font-family: inherit; box-shadow: var(--bubble-shadow);
        }
        .lesson-action-btn:hover { background: var(--lesson-hover); border-color: var(--accent-alt); }

        /* ── Encyclopedia Modal ─────────────────────────── */
        #encyclopedia-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }
        #encyclopedia-modal.active { opacity: 1; visibility: visible; }
        #encyclopedia-modal .modal-content {
            background: var(--modal-bg); border: 1px solid var(--modal-border);
            border-radius: 12px; padding: 1.5rem;
            max-width: 640px; width: 90%; max-height: 80vh; overflow-y: auto;
            position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            transform: scale(0.95); transition: transform 0.2s;
            color: var(--modal-text);
        }
        #encyclopedia-modal.active .modal-content { transform: scale(1); }
        #encyclopedia-modal .close-modal {
            position: absolute; top: 12px; right: 12px;
            background: none; border: none;
            font-size: 1.3rem; color: var(--modal-close); cursor: pointer;
            transition: color 0.15s; line-height: 1;
        }
        #encyclopedia-modal .close-modal:hover { color: var(--modal-text); }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-weight: 600; color: var(--modal-text); margin-top: 1em; margin-bottom: 0.5rem;
        }
        .markdown-body ul { list-style: disc; padding-left: 1.5em; margin-bottom: 0.75rem; }
        .markdown-body p  { margin-bottom: 0.75em; line-height: 1.6; color: var(--modal-text); }
        .markdown-body strong { font-weight: 700; }

        /* ── Input Area ─────────────────────────────────── */
        #input-area {
            background: var(--input-area-bg);
            padding: 8px 12px;
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0;
        }

        #mainInput {
            flex: 1; min-height: 44px;
            background: var(--input-field-bg); border: none;
            color: var(--input-field-text);
            padding: 10px 16px; border-radius: 8px;
            outline: none; font-size: 0.93rem; font-family: inherit;
        }
        #mainInput::placeholder { color: var(--input-placeholder); }
        #mainInput:disabled     { opacity: 0.6; }

        .send-btn {
            width: 48px; height: 48px;
            background: var(--send-btn-bg); border: none; border-radius: 50%;
            color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.18s, transform 0.1s; flex-shrink: 0;
        }
        .send-btn:hover  { background: var(--send-btn-hover); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { background: var(--scrollbar); cursor: not-allowed; transform: none; }

        /* ── Profile Sidebar ────────────────────────────── */
        #profile-sidebar {
            position: fixed; top: 0; right: 0;
            width: 340px; height: 100%;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--sidebar-border);
            z-index: 50;
            transform: translateX(100%);
            transition: transform 0.28s ease;
            overflow-y: auto; display: flex; flex-direction: column;
        }
        #profile-sidebar.open { transform: translateX(0); }

        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg); z-index: 45;
            opacity: 0; visibility: hidden;
            transition: opacity 0.28s, visibility 0.28s;
        }
        #sidebar-overlay.active { opacity: 1; visibility: visible; }

        .sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; background: var(--header-bg); flex-shrink: 0;
        }
        .sidebar-header h2 { font-size: 1rem; font-weight: 600; color: #fff; margin: 0; }
        .sidebar-close {
            background: none; border: none; color: rgba(255,255,255,0.75);
            font-size: 1.4rem; cursor: pointer; padding: 2px 6px; border-radius: 4px;
            transition: color 0.15s; line-height: 1;
        }
        .sidebar-close:hover { color: #fff; }

        .sidebar-tabs {
            display: flex; background: var(--sidebar-tab-bg);
            border-bottom: 1px solid var(--sidebar-border); flex-shrink: 0;
        }
        .sidebar-tab {
            flex: 1; padding: 10px; text-align: center;
            font-size: 0.8rem; font-weight: 500; color: var(--sidebar-tab-text);
            background: none; border: none; cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s; font-family: inherit;
        }
        .sidebar-tab:hover { color: var(--sidebar-text); }
        .sidebar-tab.active { color: var(--sidebar-tab-active); border-bottom-color: var(--sidebar-tab-active); }

        .sidebar-body { padding: 16px; flex: 1; color: var(--sidebar-text); }

        .sidebar-stats {
            display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 16px;
        }
        .sidebar-stat {
            background: var(--sidebar-stat-bg); border: 1px solid var(--sidebar-stat-border);
            border-radius: 8px; padding: 10px 4px; text-align: center;
        }
        .sidebar-stat .num { font-size: 1.4rem; font-weight: 700; color: var(--sidebar-stat-num); }
        .sidebar-stat .lbl { font-size: 0.63rem; color: var(--sidebar-stat-lbl); margin-top: 2px; }

        .sidebar-section { margin-bottom: 18px; }
        .sidebar-section-title {
            font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--sidebar-muted); margin-bottom: 8px;
        }

        .sidebar-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: var(--sidebar-badge-bg); border: 1px solid var(--sidebar-badge-bd);
            color: var(--sidebar-badge-text); font-size: 0.75rem; font-weight: 500;
            padding: 3px 8px; border-radius: 999px; margin: 0 4px 4px 0;
        }
        .sidebar-badge .remove-class {
            background: none; border: none; color: var(--sidebar-muted);
            cursor: pointer; font-size: 0.9rem; padding: 0; margin-left: 2px;
            transition: color 0.15s; line-height: 1;
        }
        .sidebar-badge .remove-class:hover { color: #EF4444; }

        .sidebar-input-row { display: flex; gap: 6px; }
        .sidebar-input {
            flex: 1; padding: 8px 10px;
            background: var(--sidebar-input-bg); border: 1px solid var(--sidebar-input-bd);
            border-radius: 6px; color: var(--sidebar-input-text); font-size: 0.85rem;
            outline: none; font-family: inherit;
        }
        .sidebar-input:focus { border-color: var(--sidebar-input-focus); }

        .sidebar-btn {
            padding: 8px 12px; background: var(--sidebar-btn-bg); color: #fff;
            border: none; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: background 0.18s; white-space: nowrap; font-family: inherit;
        }
        .sidebar-btn:hover    { background: var(--sidebar-btn-hover); }
        .sidebar-btn:disabled { background: var(--scrollbar); cursor: not-allowed; }
        .sidebar-btn-danger {
            background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #DC2626;
        }
        .sidebar-btn-danger:hover { background: rgba(239,68,68,0.2); }

        [data-theme="dark"] .sidebar-btn-danger { color: #FCA5A5; }

        .sidebar-code-list { list-style: none; padding: 0; }
        .sidebar-code-list li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 0; border-bottom: 1px solid var(--sidebar-code-bd); font-size: 0.8rem;
        }
        .sidebar-code-list li:last-child { border-bottom: none; }
        .sidebar-code-list a { color: var(--sidebar-code-link); text-decoration: none; font-weight: 600; }
        .sidebar-code-list a:hover { text-decoration: underline; }
        .sidebar-code-title {
            color: var(--sidebar-code-title); font-size: 0.73rem;
            max-width: 55%; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .sidebar-toggle {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0; font-size: 0.85rem; color: var(--sidebar-text);
        }
        .toggle-switch {
            width: 44px; height: 24px; background: var(--toggle-off);
            border-radius: 12px; position: relative; cursor: pointer;
            transition: background 0.2s; flex-shrink: 0;
        }
        .toggle-switch.on { background: var(--toggle-on); }
        .toggle-switch::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 18px; height: 18px; background: #fff; border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle-switch.on::after { transform: translateX(20px); }

        @media (max-width: 480px) {
            #profile-sidebar { width: 100%; }
            .message-bubble  { max-width: 84%; }
            .msg-buttons     { max-width: 84%; }
            .lesson-pack-wrapper { max-width: 90%; }
            #chat-feed       { padding: 10px 12px 8px; }
        }
    </style>
</head>

<body>

    <!-- Encyclopedia Modal -->
    <div id="encyclopedia-modal" onclick="closeEncyclopedia(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeEncyclopedia()">&#x2715;</button>
            <div id="encyclopedia-body" class="markdown-body"></div>
        </div>
    </div>

    <!-- Profile Sidebar -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div id="profile-sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-title">Profile</h2>
            <button class="sidebar-close" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="profile"  onclick="switchTab('profile')">Profile</button>
            <button class="sidebar-tab"         data-tab="settings" onclick="switchTab('settings')">Settings</button>
        </div>
        <div class="sidebar-body" id="sidebar-content"></div>
    </div>

    <!-- Main Chat -->
    <div id="chat-container">

        <div id="chat-header">
            <div class="header-avatar">CG</div>
            <div class="header-info">
                <div class="header-name">ClassGen AI</div>
                <div class="header-status" id="header-status">online</div>
            </div>
            <div class="header-actions">
                <button id="notify-btn" onclick="enableNotifications()">
                    <svg xmlns="http://www.w3.org/2000/svg" style="display:inline;vertical-align:middle;width:11px;height:11px;margin-right:3px" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
                    Notifications
                </button>
                <button id="profile-btn" class="header-btn" title="Profile" onclick="toggleSidebar()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                </button>
            </div>
        </div>

        <div id="breadcrumb-bar"></div>
        <div id="chat-feed"></div>

        <div id="input-area">
            <input type="text" id="mainInput" placeholder="Message ClassGen..."
                onkeypress="handleEnter(event)" autocomplete="off">
            <button onclick="submitPrompt()" class="send-btn" id="send-btn" title="Send">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>

    </div>

    <script>
        const threadId = localStorage.getItem('classgen_thread_id') || ("chat_" + Math.random().toString(36).substring(2, 10));
        localStorage.setItem('classgen_thread_id', threadId);

        const chatFeed    = document.getElementById('chat-feed');
        const inputField  = document.getElementById('mainInput');
        const sendBtn     = document.getElementById('send-btn');
        const headerStatus= document.getElementById('header-status');
        const contextPath = [];

        // ── Theme ─────────────────────────────────────────────

        function applyTheme(dark) {
            document.documentElement.classList.add('theme-transitioning');
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            localStorage.setItem('classgen_theme', dark ? 'dark' : 'light');
            setTimeout(() => document.documentElement.classList.remove('theme-transitioning'), 300);
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            applyTheme(!isDark);
            const toggle = document.getElementById('dark-toggle');
            if (toggle) toggle.classList.toggle('on', !isDark);
        }

        function isDarkMode() {
            return document.documentElement.getAttribute('data-theme') === 'dark';
        }

        // ── Helpers ───────────────────────────────────────────

        function getTimestamp() {
            const d = new Date();
            return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        }

        function triggerHaptic(type = 'light') {
            if (navigator.vibrate) navigator.vibrate(type === 'medium' ? 20 : 10);
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function scrollToBottom() {
            setTimeout(() => chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' }), 50);
        }

        function setThinking(on) {
            headerStatus.textContent = on ? 'typing...' : 'online';
            sendBtn.disabled   = on;
            inputField.disabled= on;
        }

        // ── Message Rendering ─────────────────────────────────

        function createAiGroup(contentHtml, buttons = []) {
            const group = document.createElement('div');
            group.className = 'msg-group ai';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble bubble-ai';
            bubble.innerHTML = `${contentHtml}<div class="bubble-footer"><span class="bubble-time">${getTimestamp()}</span></div>`;
            group.appendChild(bubble);

            if (buttons.length > 0) {
                const btns = document.createElement('div');
                btns.className = 'msg-buttons';
                buttons.forEach(text => {
                    const btn = document.createElement('button');
                    btn.className = 'wa-reply-btn';
                    btn.textContent = text;
                    btn.addEventListener('click', () => submitPromptWithText(text));
                    btns.appendChild(btn);
                });
                group.appendChild(btns);
            }

            return group;
        }

        function createUserGroup(text) {
            const group = document.createElement('div');
            group.className = 'msg-group user';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble bubble-user';
            bubble.innerHTML = `${escapeHtml(text)}<div class="bubble-footer"><span class="bubble-time">${getTimestamp()}</span><span class="bubble-ticks">&#10003;&#10003;</span></div>`;
            group.appendChild(bubble);

            return group;
        }

        function createTypingGroup() {
            const group = document.createElement('div');
            group.className = 'msg-group ai';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble bubble-ai';
            bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
            group.appendChild(bubble);
            return group;
        }

        // ── Block icons ───────────────────────────────────────
        const BLOCK_ICONS = {
            OPENER:       '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>',
            EXPLAIN:      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>',
            ACTIVITY:     '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>',
            HOMEWORK:     '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>',
            TEACHER_NOTES:'<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>'
        };

        function renderBlock(blockType, title, summary, details) {
            const icon = BLOCK_ICONS[blockType] || BLOCK_ICONS.OPENER;
            const block = document.createElement('div');
            block.className = 'encyclopedia-block';
            block.innerHTML = `
                <div class="encyclopedia-title">${icon} ${escapeHtml(title)}</div>
                <div class="encyclopedia-summary">${escapeHtml(summary)}</div>
            `;
            block.addEventListener('click', () => {
                openEncyclopedia(title, escapeHtml(details).replace(/\n/g, '<br>'));
            });
            return block;
        }

        // ── Encyclopedia Modal ────────────────────────────────

        function openEncyclopedia(title, detailsHtml) {
            triggerHaptic('light');
            document.getElementById('encyclopedia-body').innerHTML = `
                <div style="color:var(--modal-accent);margin-bottom:1rem;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em">${escapeHtml(title)}</div>
                <div style="line-height:1.7;font-size:0.95rem">${detailsHtml}</div>
            `;
            document.getElementById('encyclopedia-modal').classList.add('active');
        }

        function closeEncyclopedia(e) {
            if (e && e.target !== document.getElementById('encyclopedia-modal') && !e.target.classList.contains('close-modal')) return;
            document.getElementById('encyclopedia-modal').classList.remove('active');
        }

        // ── Input Handlers ────────────────────────────────────

        function handleEnter(e) { if (e.key === 'Enter') submitPrompt(); }

        function submitPromptWithText(text) {
            inputField.value = text;
            submitPrompt();
        }

        // ── Main Submit ───────────────────────────────────────

        async function submitPrompt() {
            const text = inputField.value.trim();
            if (!text || inputField.disabled) return;

            inputField.value = '';
            setThinking(true);
            triggerHaptic('medium');

            // Breadcrumb
            contextPath.push(text);
            const bar = document.getElementById('breadcrumb-bar');
            bar.classList.add('visible');
            const trunc = s => s.length > 20 ? s.slice(0, 20) + '…' : s;
            bar.innerHTML = '<span style="color:var(--accent);font-weight:600;margin-right:8px">Context:</span>' +
                contextPath.slice(0, 5).map((item, i, arr) => {
                    const sep = i < arr.length - 1 ? '<span style="margin:0 4px;opacity:0.4">›</span>' : '';
                    return `<span title="${escapeHtml(item)}">${escapeHtml(trunc(item))}</span>${sep}`;
                }).join('');

            chatFeed.appendChild(createUserGroup(text));
            scrollToBottom();

            const typingGroup = createTypingGroup();
            chatFeed.appendChild(typingGroup);
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: threadId })
                });
                if (!response.ok) {
                    throw new Error(response.status === 422 ? 'Message too long or invalid.' : 'Server error. Please try again.');
                }
                const data = await response.json();
                if (chatFeed.contains(typingGroup)) chatFeed.removeChild(typingGroup);

                let rawText = data.reply;
                let buttons = [];

                const suggestsMatch = rawText.match(/SUGGESTIONS:\s*(.*)/i);
                if (suggestsMatch) {
                    buttons = suggestsMatch[1].split('|')
                        .map(o => o.trim().replace(/^\[|\]$/g, '').trim())
                        .filter(Boolean).slice(0, 3);
                    rawText = rawText.replace(/SUGGESTIONS:\s*(.*)/i, '').trim();
                }

                const blockRegex = /\[BLOCK_START_(.*?)\](.*?)\[BLOCK_END\]/gs;
                const blocks = [];
                let match;
                while ((match = blockRegex.exec(rawText)) !== null) {
                    const blockType = match[1].trim();
                    const blockContent = match[2];
                    const titleMatch   = blockContent.match(/Title:\s*\*{0,2}(.*?)\*{0,2}\s*(?:\n|$)/i);
                    const summaryMatch = blockContent.match(/Summary:\s*(.*?)(?:\n|$)/i);
                    const detailsMatch = blockContent.match(/Details:\s*([\s\S]*?)$/i);
                    blocks.push({
                        type:    blockType,
                        title:   titleMatch   ? titleMatch[1].replace(/\*\*/g,'').trim() : blockType,
                        summary: summaryMatch ? summaryMatch[1].trim() : '',
                        details: detailsMatch ? detailsMatch[1].trim() : ''
                    });
                }

                if (blocks.length > 0) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'lesson-pack-wrapper';

                    const label = document.createElement('div');
                    label.className = 'lesson-pack-label';
                    label.textContent = 'Lesson Pack';
                    wrapper.appendChild(label);

                    blocks.forEach(b => wrapper.appendChild(renderBlock(b.type, b.title, b.summary, b.details)));

                    const actions = document.createElement('div');
                    actions.className = 'lesson-actions';
                    if (data.pdf_url) {
                        const pdfLink = document.createElement('a');
                        pdfLink.href = data.pdf_url; pdfLink.target = '_blank';
                        pdfLink.className = 'lesson-action-btn';
                        pdfLink.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg> Download PDF';
                        actions.appendChild(pdfLink);
                    }
                    if (data.homework_code) {
                        const hwLink = document.createElement('a');
                        hwLink.href = '/h/' + encodeURIComponent(data.homework_code); hwLink.target = '_blank';
                        hwLink.className = 'lesson-action-btn';
                        hwLink.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg> Homework: ' + escapeHtml(data.homework_code);
                        actions.appendChild(hwLink);
                    }
                    if (actions.children.length > 0) wrapper.appendChild(actions);
                    chatFeed.appendChild(wrapper);
                } else {
                    let formattedHtml = escapeHtml(rawText).replace(/\n/g, '<br>');
                    formattedHtml = formattedHtml.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    chatFeed.appendChild(createAiGroup(formattedHtml, buttons));
                }

                scrollToBottom();

            } catch (err) {
                if (chatFeed.contains(typingGroup)) chatFeed.removeChild(typingGroup);
                chatFeed.appendChild(createAiGroup(
                    `<span style="color:#EF4444;font-weight:500">Connection Error</span><br><span style="font-size:0.82rem;opacity:0.65">${escapeHtml(err.message)}</span>`
                ));
                scrollToBottom();
            }

            setThinking(false);
            inputField.focus();
        }

        // ── Push Notifications ────────────────────────────────
        let swRegistration = null;

        async function initServiceWorker() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
            try {
                swRegistration = await navigator.serviceWorker.register('/static/sw.js');
                const sub = await swRegistration.pushManager.getSubscription();
                if (!sub) document.getElementById('notify-btn').style.display = 'inline-flex';
            } catch (e) { console.log('SW registration failed:', e); }
        }

        async function enableNotifications() {
            if (!swRegistration) return;
            const btn = document.getElementById('notify-btn');
            try {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') { btn.textContent = 'Blocked'; btn.disabled = true; return; }
                const keyResp = await fetch('/api/vapid-key');
                const keyData = await keyResp.json();
                if (!keyData.publicKey) { btn.style.display = 'none'; return; }
                const sub = await swRegistration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(keyData.publicKey),
                });
                const subJson = sub.toJSON();
                await fetch('/api/push/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint: subJson.endpoint, keys: subJson.keys, teacher_id: threadId }),
                });
                btn.style.display = 'none';
            } catch (e) { console.error('Push subscription failed:', e); }
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const raw = window.atob(base64);
            const arr = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
            return arr;
        }

        // ── Profile Sidebar ───────────────────────────────────
        const profileState = { registered: false, teacher: null, stats: null, codes: [], loaded: false };
        let currentTab = 'profile';
        let pushEnabled = false;

        function toggleSidebar() {
            const sidebar = document.getElementById('profile-sidebar');
            if (sidebar.classList.contains('open')) { closeSidebar(); return; }
            sidebar.classList.add('open');
            document.getElementById('sidebar-overlay').classList.add('active');
            if (!profileState.loaded) fetchProfile();
            else renderSidebar();
        }

        function closeSidebar() {
            document.getElementById('profile-sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('active');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            renderSidebar();
        }

        async function fetchProfile() {
            try {
                const resp = await fetch('/api/teacher/profile?thread_id=' + encodeURIComponent(threadId));
                const data = await resp.json();
                profileState.loaded = true;
                profileState.registered = data.registered;
                if (data.registered) {
                    profileState.teacher = data.teacher;
                    profileState.stats   = data.stats;
                    profileState.codes   = data.codes || [];
                    document.getElementById('profile-btn').classList.add('registered');
                }
            } catch (e) { console.error('Error fetching profile:', e); profileState.loaded = true; }
            renderSidebar();
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-content');
            if (currentTab === 'profile') renderProfileTab(container);
            else renderSettingsTab(container);
        }

        function renderProfileTab(container) {
            if (!profileState.registered) {
                container.innerHTML = `
                    <div style="padding:2rem 0;text-align:center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" style="margin:0 auto 1rem;display:block"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                        <p style="color:var(--sidebar-muted);font-size:0.85rem;margin-bottom:1.25rem">Set up your profile to track lessons and manage homework codes.</p>
                        <div class="sidebar-input-row" style="flex-direction:column;gap:0.6rem">
                            <input class="sidebar-input" id="register-name" type="text" placeholder="Your name (e.g. Mrs. Okafor)" maxlength="100">
                            <button class="sidebar-btn" style="width:100%" onclick="registerTeacher()">Get Started</button>
                        </div>
                    </div>
                `;
                return;
            }

            const t = profileState.teacher;
            const s = profileState.stats || { total: 0, this_week: 0, this_month: 0 };
            const codes = profileState.codes || [];

            const classesHtml = (t.classes && t.classes.length)
                ? t.classes.map(c => `<span class="sidebar-badge">${escapeHtml(c)}<button class="remove-class" onclick="removeClass('${escapeHtml(c)}')">&times;</button></span>`).join('')
                : `<span style="color:var(--sidebar-muted);font-size:0.8rem">No classes added yet</span>`;

            const codesHtml = codes.length
                ? '<ul class="sidebar-code-list">' + codes.map(c =>
                    `<li><a href="/h/${escapeHtml(c.code)}" target="_blank">${escapeHtml(c.code)}</a><span class="sidebar-code-title">${escapeHtml(c.title)}</span></li>`
                  ).join('') + '</ul>'
                : `<span style="color:var(--sidebar-muted);font-size:0.8rem">Generate a lesson to create homework codes</span>`;

            container.innerHTML = `
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Name</div>
                    <div class="sidebar-input-row">
                        <input class="sidebar-input" id="edit-name" type="text" value="${escapeHtml(t.name)}" maxlength="100">
                        <button class="sidebar-btn" onclick="updateName()">Save</button>
                    </div>
                </div>
                <div class="sidebar-stats">
                    <div class="sidebar-stat"><div class="num">${s.total}</div><div class="lbl">Total</div></div>
                    <div class="sidebar-stat"><div class="num">${s.this_week}</div><div class="lbl">This Week</div></div>
                    <div class="sidebar-stat"><div class="num">${s.this_month}</div><div class="lbl">This Month</div></div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Classes</div>
                    <div style="margin-bottom:0.5rem">${classesHtml}</div>
                    <div class="sidebar-input-row">
                        <input class="sidebar-input" id="add-class-input" type="text" placeholder="e.g. SS2 Biology">
                        <button class="sidebar-btn" onclick="addClass()">Add</button>
                    </div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Recent Homework</div>
                    ${codesHtml}
                </div>
                ${t.slug ? `<div style="text-align:center;margin-top:0.5rem"><a href="/t/${escapeHtml(t.slug)}" target="_blank" style="color:var(--sidebar-code-link);font-size:0.8rem">View profile</a> &middot; <a href="/t/${escapeHtml(t.slug)}/export" style="color:var(--sidebar-code-link);font-size:0.8rem">Export CSV</a></div>` : ''}
            `;
        }

        function renderSettingsTab(container) {
            const dark = isDarkMode();
            const push = pushEnabled;
            container.innerHTML = `
                <div class="sidebar-section">
                    <div class="sidebar-section-title">Appearance</div>
                    <div class="sidebar-toggle">
                        <span>Dark mode</span>
                        <div class="toggle-switch ${dark ? 'on' : ''}" id="dark-toggle" onclick="toggleDarkMode()"></div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-section-title">Notifications</div>
                    <div class="sidebar-toggle">
                        <span>Push notifications</span>
                        <div class="toggle-switch ${push ? 'on' : ''}" id="push-toggle" onclick="togglePush()"></div>
                    </div>
                    <p style="font-size:0.7rem;color:var(--sidebar-muted);margin-top:4px">Get notified when students submit quizzes</p>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-section-title">Chat</div>
                    <button class="sidebar-btn sidebar-btn-danger" style="width:100%" onclick="clearChatHistory()">Clear chat history</button>
                    <p style="font-size:0.7rem;color:var(--sidebar-muted);margin-top:6px">Removes all messages from this session</p>
                </div>
            `;
        }

        async function registerTeacher() {
            const nameInput = document.getElementById('register-name');
            const name = nameInput ? nameInput.value.trim() : '';
            if (name.length < 2) { nameInput && nameInput.focus(); return; }
            try {
                const resp = await fetch('/api/teacher/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ thread_id: threadId, name }),
                });
                if (!resp.ok) return;
                const data = await resp.json();
                profileState.registered = true;
                profileState.teacher = data.teacher;
                profileState.stats   = { total: 0, this_week: 0, this_month: 0 };
                profileState.codes   = [];
                document.getElementById('profile-btn').classList.add('registered');
                renderSidebar();
            } catch (e) { console.error('Register error:', e); }
        }

        async function updateName() {
            const nameInput = document.getElementById('edit-name');
            const name = nameInput ? nameInput.value.trim() : '';
            if (name.length < 2) return;
            try {
                const resp = await fetch('/api/teacher/profile', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ thread_id: threadId, name }),
                });
                if (!resp.ok) return;
                const data = await resp.json();
                profileState.teacher = data.teacher;
                renderSidebar();
            } catch (e) { console.error('Update name error:', e); }
        }

        async function addClass() {
            const input = document.getElementById('add-class-input');
            const className = input ? input.value.trim() : '';
            if (className.length < 3) { input && input.focus(); return; }
            try {
                const resp = await fetch('/api/teacher/classes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ thread_id: threadId, class_name: className }),
                });
                if (!resp.ok) return;
                const data = await resp.json();
                profileState.teacher.classes = data.classes;
                renderSidebar();
            } catch (e) { console.error('Add class error:', e); }
        }

        async function removeClass(className) {
            try {
                const resp = await fetch('/api/teacher/classes/' + encodeURIComponent(className) + '?thread_id=' + encodeURIComponent(threadId), { method: 'DELETE' });
                if (!resp.ok) return;
                const data = await resp.json();
                profileState.teacher.classes = data.classes;
                renderSidebar();
            } catch (e) { console.error('Remove class error:', e); }
        }

        async function clearChatHistory() {
            if (!confirm('Clear all chat messages? This cannot be undone.')) return;
            try {
                await fetch('/api/teacher/history?thread_id=' + encodeURIComponent(threadId), { method: 'DELETE' });
                chatFeed.innerHTML = '';
                contextPath.length = 0;
                const bar = document.getElementById('breadcrumb-bar');
                bar.classList.remove('visible'); bar.innerHTML = '';
                chatFeed.appendChild(createAiGroup('Chat history cleared. What topic shall we work on?'));
                scrollToBottom();
            } catch (e) { console.error('Clear history error:', e); }
        }

        async function togglePush() {
            if (pushEnabled) return;
            await enableNotifications();
            if (swRegistration) {
                const sub = await swRegistration.pushManager.getSubscription();
                if (sub) {
                    pushEnabled = true;
                    const toggle = document.getElementById('push-toggle');
                    if (toggle) toggle.classList.add('on');
                }
            }
        }

        async function checkPushStatus() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
            try {
                const reg = await navigator.serviceWorker.getRegistration('/static/sw.js');
                if (reg) { const sub = await reg.pushManager.getSubscription(); pushEnabled = !!sub; }
            } catch (e) {}
        }

        window.onload = () => {
            chatFeed.appendChild(createAiGroup(
                'Hey! Let\'s build a great lesson. What subject are we teaching today?'
            ));
            inputField.focus();
            initServiceWorker();
            fetchProfile();
            checkPushStatus();
        };
    </script>
</body>
</html>
